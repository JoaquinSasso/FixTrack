<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nueva orden</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="css/home_simplified.css" />
    <script type="module" src="js/pages/new-order.js"></script>
  </head>
  <body>
    <!-- Header -->
    <div class="container-fluid mt-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <!-- Bloque: logo + nombre -->
        <div class="d-flex align-items-center">
          <img
            id="businessLogo"
            class="business-logo mr-2 d-none"
            src=""
            alt="Logo del negocio" />
          <h2 id="businessNameHome" class="h5 mb-0">Panel de órdenes</h2>
        </div>

        <!-- Bloque: navegación + botones -->
        <div class="d-flex align-items-center">
          <a href="index.html" class="btn btn-link btn-sm mr-2">Órdenes</a>
          <a href="nueva-orden.html" class="btn btn-link btn-sm mr-2">Nueva
            orden</a>
          <a href="clientes.html" class="btn btn-link btn-sm mr-3">Clientes</a>

          <button
            id="btnLogout"
            class="btn btn-outline-danger btn-sm">
            Cerrar sesión
          </button>
        </div>
      </div>
      <hr class="my-0" />
    </div>

    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div id="createOrderSection" class="card p-4 mb-4">
            <h1 class="h4 mb-3 text-center">Crear nueva orden</h1>
            <p class="text-muted small mb-3 text-center">
              Ingresá los datos del cliente y del equipo. Podrás editar la
              información más adelante.
            </p>

            <h3 class="section-title">Datos del cliente</h3>
            <div class="form-group">
              <input
                type="text"
                id="clientDNI"
                class="form-control"
                placeholder="DNI o CUIT del cliente"
                autocomplete="off" />
            </div>
            <div class="form-group">
              <input
                type="text"
                id="clientName"
                class="form-control"
                placeholder="Nombre y apellido"
                autocomplete="off" />
            </div>
            <div class="form-group">
              <input
                type="text"
                id="clientPhone"
                class="form-control"
                placeholder="Teléfono de contacto"
                autocomplete="off" />
            </div>

            <h3 class="section-title mt-3">Equipo</h3>
            <div class="form-group">
              <input
                type="text"
                id="deviceType"
                class="form-control"
                placeholder="Tipo de equipo (PC, notebook, impresora...)"
                autocomplete="off" />
            </div>
            <div class="form-group">
              <input
                type="text"
                id="deviceBrand"
                class="form-control"
                placeholder="Marca / modelo (opcional)"
                autocomplete="off" />
            </div>
            <div class="form-group">
              <input
                type="text"
                id="deviceSerial"
                class="form-control"
                placeholder="Número de serie o IMEI (opcional)"
                autocomplete="off" />
            </div>

            <h3 class="section-title mt-3">Detalle</h3>
            <div class="form-group" id="faultDescriptionContainer">
              <label
                for="faultDescription"
                class="small font-weight-semibold mb-1">
                Falla informada
              </label>
              <textarea
                id="faultDescription"
                class="form-control"
                rows="3"
                placeholder="Describí la falla principal"></textarea>
              <small
                id="characterCounter"
                class="form-text text-muted text-right">
                1650 caracteres restantes
              </small>
            </div>

            <div class="form-group">
              <textarea
                id="observations"
                class="form-control"
                rows="2"
                placeholder="Observaciones internas (opcional)"></textarea>
            </div>

            <div class="form-group">
              <input
                type="number"
                step="0.01"
                id="budget"
                class="form-control"
                placeholder="Presupuesto estimado (opcional)" />
            </div>

            <button id="createOrderButton" class="btn btn-success btn-block">
              Crear orden
            </button>
            <p id="statusMessage" class="mt-2 text-center small"></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
