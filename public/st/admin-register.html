<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta</title>
  <link
    rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
  >
  <script type="module" src="js/pages/admin-register.js"></script>
</head>
<body>
  <div class="container">
    <h2 class="text-center mt-5">Crear cuenta</h2>

    <p id="registerStatus" class="text-center mt-2"></p>

    <form id="registerForm" class="mt-3">
      <div class="form-group">
        <label for="fullName">Nombre y apellido</label>
        <input
          type="text"
          class="form-control"
          id="fullName"
          placeholder="Tu nombre completo"
          required
        >
      </div>

      <div class="form-group">
        <label for="registerEmail">Correo electrónico</label>
        <input
          type="email"
          class="form-control"
          id="registerEmail"
          placeholder="ejemplo@correo.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="registerPassword">Contraseña</label>
        <input
          type="password"
          class="form-control"
          id="registerPassword"
          placeholder="Mínimo 6 caracteres"
          required
        >
      </div>

      <div class="form-group">
        <label for="registerPassword2">Repetir contraseña</label>
        <input
          type="password"
          class="form-control"
          id="registerPassword2"
          placeholder="Repetí la contraseña"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        Crear cuenta
      </button>

      <p class="mt-3 text-center">
        ¿Ya tenés cuenta?
        <a href="admin-login.html">Iniciar sesión</a>
      </p>
    </form>
  </div>
</body>
</html>
